name: build_dashboard

on:
  # Autorise le déclenchement manuel
  workflow_dispatch: {}

  # Déclenché par le workflow refresh
  workflow_run:
    workflows: ["daily_refresh"]
    types: [completed]
  
  # Déclenché par un push sur main dans le dossier dashboard
  push:
    branches: [main]
    paths:
      - 'dashboard/**'

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm install

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip duckdb.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      - name: Pre-create R2 secret in DuckDB
        run: |
          duckdb -c "
          INSTALL httpfs; LOAD httpfs;
          CREATE OR REPLACE PERSISTENT SECRET r2 (
            TYPE S3,
            KEY_ID '${{ secrets.R2_ACCESS_KEY_ID }}',
            SECRET '${{ secrets.R2_SECRET_ACCESS_KEY }}',
            ENDPOINT '${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com',
            REGION 'auto',
            URL_STYLE 'path'
          );
          "
      
      - name: build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}/dashboard'
        run: |
          cd dashboard
          npm run sources
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/build/${{ github.event.repository.name }}'

  deploy-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4