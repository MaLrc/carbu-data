name: scheduled_refresh

on:
  # Allow manual runs from the Actions UI
  workflow_dispatch: {}
  schedule:
    # Runs every Saturday and Sunday at 10:00 UTC. GitHub Actions uses UTC for cron schedules.
    - cron: '0 9 * * *'

env:
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  # daily-refresh:
  #   runs-on: ubuntu-latest
  #   environment: env
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4

  #     - name: Set up Python
  #       uses: actions/setup-python@v4
  #       with:
  #         python-version: '3.12'

  #     - name: Install uv (astral-sh)
  #       uses: astral-sh/setup-uv@v6

  #     - name: Install dependencies with uv
  #       run: uv sync

  #     - name: Run refresh pipeline
  #       run: uv run pipelines/pp_run.py
  
  build-dashboard:
    # needs: daily-refresh
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm install

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip duckdb.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      - name: Pre-create R2 secret in DuckDB
        run: |
          duckdb -c "
          INSTALL httpfs; LOAD httpfs;
          CREATE OR REPLACE PERSISTENT SECRET r2 (
            TYPE S3,
            KEY_ID '${{ secrets.R2_ACCESS_KEY_ID }}',
            SECRET '${{ secrets.R2_SECRET_ACCESS_KEY }}',
            ENDPOINT '${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com',
            REGION 'auto',
            URL_STYLE 'path'
          );
          "
      
      - name: test_secret
        run: duckdb /tmp/evidence_secrets.db -c "from duckdb_secrets();"

      - name: build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}/dashboard'
        run: |
          cd dashboard
          npm run sources
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/build/${{ github.event.repository.name }}'

  deploy-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4